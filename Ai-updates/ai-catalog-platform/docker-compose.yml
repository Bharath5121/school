services:
  frontend:
    build:
      context: .
      dockerfile: ./frontend/apps/student/Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - BACKEND_URL=http://student-api:4001
      - NODE_ENV=${NODE_ENV:-development}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    depends_on:
      - student-api
    restart: unless-stopped
    networks:
      - app-network

  student-api:
    build:
      context: ./backend/apps/student
      dockerfile: Dockerfile
    ports:
      - '4001:4001'
    environment:
      - PORT=4001
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - REDIS_URL=${REDIS_URL:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - NODE_ENV=${NODE_ENV:-development}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
    restart: unless-stopped
    networks:
      - app-network

  admin-api:
    build:
      context: ./backend/apps/admin
      dockerfile: Dockerfile
    ports:
      - '4003:4003'
    environment:
      - PORT=4003
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - REDIS_URL=${REDIS_URL:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - NODE_ENV=${NODE_ENV:-development}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
    restart: unless-stopped
    networks:
      - app-network

  admin-frontend:
    build:
      context: .
      dockerfile: ./frontend/apps/admin/Dockerfile
      args:
        - BACKEND_URL=http://admin-api:4003
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    ports:
      - '3050:3000'
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - BACKEND_URL=http://admin-api:4003
      - NODE_ENV=${NODE_ENV:-development}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    depends_on:
      - admin-api
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
